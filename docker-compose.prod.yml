services:
  backend:
    image: registry.digitalocean.com/stacklabregistry/burger-backend:1.5
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@local-postgres:5432/${POSTGRES_DB}
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      WA_SESSION_PATH: /app/wa-session
      BUSINESS_NAME: ${BUSINESS_NAME:-Lomi Liz}
      ESTIMATED_DELIVERY_MINUTES: ${ESTIMATED_DELIVERY_MINUTES:-35}
      CURRENCY_SYMBOL: ${CURRENCY_SYMBOL:-₲}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-BurgerBot/1.0}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      - wa_session:/app/wa-session
    networks:
      - infra

  frontend:
    image: registry.digitalocean.com/stacklabregistry/burger-frontend:1.5
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - infra

networks:
  infra:
    external: true
    name: local-infra_local-infra-network

volumes:
  wa_session:
