services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-burger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-burgerdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-burger}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-burger}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-burgerdb}
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      WA_SESSION_PATH: /app/wa-session
      BUSINESS_NAME: ${BUSINESS_NAME:-Lomi Liz}
      ESTIMATED_DELIVERY_MINUTES: ${ESTIMATED_DELIVERY_MINUTES:-35}
      CURRENCY_SYMBOL: ${CURRENCY_SYMBOL:-₲}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-BurgerBot/1.0}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      - wa_session:/app/wa-session

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  pgdata:
  wa_session:
